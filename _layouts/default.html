<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="/public/css/base.css">
</head>
<body>
  {% include header.html %}
  <main class="container">{{ content }}</main>
  {% include footer.html %}
  <script>
    (function () {
      var el = document.getElementById('mako-status');
      if (!el) return;
      var controller = new AbortController();
      var timer = setTimeout(function () { controller.abort(); }, 3000);
      fetch('https://healthchecker.glentiki.dev/personal/status', { signal: controller.signal })
        .then(function (r) { return r.json(); })
        .then(function (d) {
          clearTimeout(timer);
          if (d.status === 'online') {
            el.className = 'mako-status mako-online';
            el.title = 'Mako online';
          }
        })
        .catch(function () { /* offline or unreachable — stay hidden */ });
    })();
  </script>
</body>
</html>
